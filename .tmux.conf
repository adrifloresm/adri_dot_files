# ~/.tmux.conf: tmux configuration.
# Options are evaluated top-to-bottom. Reload at runtime with `prefix R`
# (bound below) or `tmux source-file ~/.tmux.conf`.
#
# tmux terminology:
#   session = a collection of windows (persists across detaches)
#   window  = a "tab" inside a session
#   pane    = a split inside a window
#   prefix  = the key combo that introduces every tmux command (default C-b)

###############################################################################
# Prefix key (disabled — using default C-b)
###############################################################################
# Uncomment to remap prefix from C-b to C-a (closer to screen's Ctrl-a, and
# avoids clash with readline's ^B = backward-char).
#unbind C-b
#set-option -g prefix C-a
#bind-key C-a send-prefix

###############################################################################
# Reload shortcut
###############################################################################
# `prefix R` re-sources this file and flashes a confirmation message.
bind-key R source-file ~/.tmux.conf \; display-message "config reloaded."

###############################################################################
# Window / pane indexing
###############################################################################
# Start numbering at 1 so `prefix 1` selects the first window (easier to
# reach on a keyboard than `prefix 0`). pane-base-index keeps panes aligned.
set -g base-index 1
set -g pane-base-index 1

###############################################################################
# xterm-keys passthrough
###############################################################################
# Let xterm-style escape sequences (Ctrl+Arrow, Shift+Arrow, etc.) reach the
# shell/editor inside tmux. Without this, readline word-navigation breaks.
set -g -w xterm-keys on

###############################################################################
# Default terminal
###############################################################################
# $TERM advertised to programs inside tmux. "xterm" is conservative and
# universally supported; consider "tmux-256color" (or "screen-256color") for
# 256-color / true-color support in vim, fzf, etc.
set -g default-terminal "xterm"

###############################################################################
# UTF-8
###############################################################################
# UTF-8 is auto-detected on modern tmux (>= 2.2); the legacy
# `set -g status-utf8 on` and `set -g utf8 on` options were REMOVED in 2.2
# and would cause "unknown option" errors.

###############################################################################
# Window / pane creation — inherit cwd from current pane
###############################################################################
# By default, new windows/panes start in $HOME. `-c "#{pane_current_path}"`
# makes them open in the same directory as the focused pane — much more
# useful when working inside a project.
bind-key c new-window              -c "#{pane_current_path}"
bind-key | split-window -h         -c "#{pane_current_path}"  # vertical divider, horizontal split
bind-key _ split-window -v         -c "#{pane_current_path}"  # horizontal divider, vertical split

###############################################################################
# Pane resizing (repeatable)
###############################################################################
# `-r` makes the binding repeatable: hold prefix once, then press < or >
# repeatedly within the repeat-time window (default 500ms).
bind-key -r < resize-pane -L
bind-key -r > resize-pane -R

###############################################################################
# Scrollback
###############################################################################
# Keep 100,000 lines of scrollback per pane (default is 2,000). Uses ~20MB
# per pane worst-case — fine on modern machines.
set -g history-limit 100000

###############################################################################
# Alt-arrow pane navigation (no prefix)
###############################################################################
# `-n` = no prefix required. Alt+Arrow jumps between panes directly.
# Conflicts with some terminal emulators' own Alt bindings — rebind those
# if needed.
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

###############################################################################
# Mouse mode
###############################################################################
# Click-to-focus panes, drag-to-resize splits, scroll-wheel scrollback.
# Heads-up: native terminal select-to-copy still works, but you'll need to
# hold Shift (xterm/gnome-terminal) or Option (iTerm2) to bypass tmux and
# let the terminal emulator handle the selection.
set -g mouse on
# `mouse-resize-pane` is a legacy tmux 1.x option; modern tmux (>= 2.1)
# folds it into `mouse on`, so this line stays commented.
#set -g mouse-resize-pane on
